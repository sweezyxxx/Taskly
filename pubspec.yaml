name: taskly
description: "Smart Task Manager with offline-first sync"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.8

  # Local Database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28

  # Cloud
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7

  # Networking
  dio: ^5.8.0+1

  # Preferences
  shared_preferences: ^2.5.3

  # Routing
  go_router: ^15.1.2

  # DI
  get_it: ^8.0.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  firebase_auth: ^5.7.0
  connectivity_plus: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Deployment
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  change_app_package_name: ^1.5.0
  image: ^4.8.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/splash/splash_logo.png"
  android: true
  ios: true
